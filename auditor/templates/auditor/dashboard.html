<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBM Audit Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light"> <div class="container mt-5">
        <h2 class="mb-4">Pharmacy Audit Summary</h2>

        <div class="row"> <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-primary">
                    <div class="card-body">
                        <h5 class="text-muted">Total Claims</h5>
                        <h2 class="text-primary">{{ stats.total_claims }}</h2> </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-danger">
                    <div class="card-body">
                        <h5 class="text-muted">Flagged Errors</h5>
                        <h2 class="text-danger">{{ stats.flagged_count }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-success">
                    <div class="card-body">
                        <h5 class="text-muted">Potential Recovery</h5>
                        <h2 class="text-success">${{ stats.potential_savings|stringformat:".2f" }}</h2>
                    </div>
                </div>
            </div>
        </div> <div class="mt-5">
            <a href="/admin/auditor/claim/" class="btn btn-outline-secondary">View All Claims in Admin</a>
        </div>
    </div>
</body>
</html>
